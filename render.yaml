services:
  - type: web
    name: ijwi-api
    runtime: node
    rootDir: apps/api
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_SERVICE_SECRET
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_FROM
        sync: false
      - key: NOTIFY_CHANNEL
        sync: false
      - key: DEMO_PHONE
        sync: false

  - type: web
    name: ijwi-ai
    runtime: node
    rootDir: apps/ai-service
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: AI_SERVICE_SECRET
        sync: false
